name: Headless Duolingo Streak

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-browser-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome and Selenium Tools
        run: |
          python -m pip install --upgrade pip
          pip install selenium

      - name: Run Streak Protector
        env:
          DUOLINGO_USERNAME: ${{ secrets.DUOLINGO_USERNAME }}
          DUOLINGO_PASSWORD: ${{ secrets.DUOLINGO_PASSWORD }}
        run: python duolingo.py
